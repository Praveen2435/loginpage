<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title>
            Create New Account
        </title>
    </head>

    <body style="background-color: antiquewhite;">

<center>
    <div style="margin-top: 150px;">
<h1>Create New Account</h1>

    <form action="./main.html">
        
    <label for="firstname" >First Name :</label>
    <input placeholder="Enter your First name" id="firstname" type="text" maxlength="50" name="first name" required>
    <br><br>
    <label for="surname">Sur Name :</label>
    <input placeholder="Enter your Surname" type="text" id="surname" name="surname" maxlength="60" required>
    <br><br>
    <label for="Email">Email :</label>
    <input placeholder="Enter your email" id="Email" type="email" name="user_email" maxlength="60" required>
    <br><br>
    <label for="otp">OTP :</label>
    <input placeholder="Enter OTP" type="tel" name="Enter OTP" id="otp" maxlength="4" required > 
    <br><br>
    <label for="username">User Name :</label>
    <input placeholder="Enter your username" type="text" name="username" id="username" maxlength="50" required>
    <br><br>
    <label for="password" >Password :</label>   
    <input type="text" placeholder="Enter your password" name="user password" id="password" maxlength="16" required>
    <br><br>
    <label for="conformpassword">Re-Enter Password :</label>
    <input placeholder="Re-Enter Password " name="password" type="text" id=" conformpassword" maxlength="16" required>
    <br><br>
     <button style="border: 0px; border-radius: 5px; font-size: 15px; background-color: rgb(140, 147, 147);">Sign Up</button>



    </form>




</div>
</center>

        
    </body>
</html>
